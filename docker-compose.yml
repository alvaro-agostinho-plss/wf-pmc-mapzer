services:
  mapzer:
    container_name: wf_pmc_mapzer
    build: .
    image: mapzer:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - BASE_PATH=/wfpmcmapzer
      - DIR_UPLOADS=/app/uploads
      - PYTHONUNBUFFERED=1
    volumes:
      # Uploads e downloads (arquivos das planilhas)
      - /home/tecnologia/upload/mapzer:/app/uploads
      # Logs (erros.log, app.log) para análise em produção
      - /home/tecnologia/logs/mapzer:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/wfpmcmapzer/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
